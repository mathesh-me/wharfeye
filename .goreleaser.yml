version: 2

project_name: wharfeye

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: ./cmd/wharfeye
    binary: wharfeye
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/mathesh-me/wharfeye/cmd/wharfeye/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: mathesh-me
    name: wharfeye
